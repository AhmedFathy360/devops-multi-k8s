name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - name: client
            dockerfile: ./client/Dockerfile
          - name: server
            dockerfile: ./server/Dockerfile
          - name: worker
            dockerfile: ./worker/Dockerfile
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Build ${{ matrix.service.name }} image for scanning
        run: |
          docker build -f ${{ matrix.service.dockerfile }} -t multi-${{ matrix.service.name }}:test ./${{ matrix.service.name }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: multi-${{ matrix.service.name }}:test
          format: 'sarif'
          output: 'trivy-${{ matrix.service.name }}.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service.name }}.sarif'
          category: 'trivy-${{ matrix.service.name }}'

  dependency-check:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - name: client
            path: ./client
          - name: server
            path: ./server
          - name: worker
            path: ./worker
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install npm audit
        run: npm install -g npm-audit-html
      
      - name: Run npm audit for ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.path }}
        run: |
          npm install
          npm audit --json > audit.json || true
          npm audit-html --output audit.html || true
      
      - name: Upload audit report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: npm-audit-${{ matrix.service.name }}
          path: ${{ matrix.service.path }}/audit.html
