name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json
      
      - name: Build client
        working-directory: ./client
        run: |
          npm ci
          npm run build
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker images
        run: |
          docker build -f client/Dockerfile -t multi-client:latest ./client
          docker build -f server/Dockerfile -t multi-server:latest ./server
          docker build -f worker/Dockerfile -t multi-worker:latest ./worker
      
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag multi-client:latest ${{ secrets.DOCKER_USERNAME }}/multi-client:latest
          docker tag multi-server:latest ${{ secrets.DOCKER_USERNAME }}/multi-server:latest
          docker tag multi-worker:latest ${{ secrets.DOCKER_USERNAME }}/multi-worker:latest
          
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-client:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-worker:latest
