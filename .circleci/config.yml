# Use the latest 2.1 version of CircleCI pipeline process engine.
version: 2.1

# Define jobs for CI/CD pipeline
jobs:
  # Client (React) testing and build
  test-client:
    docker:
      - image: cimg/node:18.12
    working_directory: ~/project/client
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - client-dependencies-{{ checksum "package.json" }}
            - client-dependencies-
      - run:
          name: "Install client dependencies"
          command: npm install
      - save_cache:
          key: client-dependencies-{{ checksum "package.json" }}
          paths:
            - node_modules
      - run:
          name: "Run client tests"
          command: npm test -- --watchAll=false --passWithNoTests
      - run:
          name: "Build client"
          command: npm run build
      - store_artifacts:
          path: build
          destination: client-build

  # Server (Node.js Express) testing and validation
  test-server:
    docker:
      - image: cimg/node:18.12
      - image: cimg/postgres:14.13
        environment:
          POSTGRES_DB: complex
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
      - image: cimg/redis:7.2
    working_directory: ~/project/server
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - server-dependencies-{{ checksum "package.json" }}
            - server-dependencies-
      - run:
          name: "Install server dependencies"
          command: npm install
      - save_cache:
          key: server-dependencies-{{ checksum "package.json" }}
          paths:
            - node_modules
      - run:
          name: "Check for vulnerabilities"
          command: npm audit --audit-level=moderate
      - run:
          name: "Validate server configuration"
          command: node index.js --dry-run || echo "Dry run not available, skipping"

  # Worker (Node.js background job) testing and validation
  test-worker:
    docker:
      - image: cimg/node:18.12
      - image: cimg/redis:7.2
    working_directory: ~/project/worker
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - worker-dependencies-{{ checksum "package.json" }}
            - worker-dependencies-
      - run:
          name: "Install worker dependencies"
          command: npm install
      - save_cache:
          key: worker-dependencies-{{ checksum "package.json" }}
          paths:
            - node_modules
      - run:
          name: "Check for vulnerabilities"
          command: npm audit --audit-level=moderate
      - run:
          name: "Validate worker configuration"
          command: node index.js --dry-run || echo "Dry run not available, skipping"

  # Build Docker images
  build-docker-images:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.14
      - run:
          name: "Build client Docker image"
          command: |
            docker build -f client/Dockerfile -t complex-client:$CIRCLE_SHA1 client/
            docker tag complex-client:$CIRCLE_SHA1 complex-client:latest
      - run:
          name: "Build server Docker image"
          command: |
            docker build -f server/Dockerfile -t complex-server:$CIRCLE_SHA1 server/
            docker tag complex-server:$CIRCLE_SHA1 complex-server:latest
      - run:
          name: "Build worker Docker image"
          command: |
            docker build -f worker/Dockerfile -t complex-worker:$CIRCLE_SHA1 worker/
            docker tag complex-worker:$CIRCLE_SHA1 complex-worker:latest

# Orchestrate jobs using workflows
workflows:
  ci-pipeline:
    jobs:
      - test-client
      - test-server
      - test-worker
      - build-docker-images:
          requires:
            - test-client
            - test-server
            - test-worker
          filters:
            branches:
              only: main